project_id = "btnyzzpibedkslhtiizu"

[functions.invia-email]
verify_jwt = true

# notifica-nuovo-stabilimento: chiamata da js/setup.js subito dopo la
# registrazione di un nuovo stabilimento (utente proprietario con sessione
# valida). Notifica gli admin via email + Telegram. verify_jwt=true: stesso
# ragionamento di invia-email (chiamante sempre autenticato).
[functions.notifica-nuovo-stabilimento]
verify_jwt = true

[functions.create-utility-backup-templates]
verify_jwt = true

# recupero-password: chiamata dalla pagina "Password dimenticata?" della UI
# da utenti NON loggati (self-service). Il progetto usa la nuova chiave
# pubblicabile `sb_publishable_*` (non-JWT), che il gateway con
# verify_jwt=true rifiuta sempre con 401 (la chiave non e' un JWT firmato).
#
# La sicurezza e' garantita dal codice:
# - Risposta sempre generica { ok: true } (anti-enumeration)
# - Validazione formato telefono + lookup clienti registrati
# - Usa SERVICE_KEY interno per Admin API (generateLink) e invio WA
#
# Vedi BUGFIX 5 giu 2026 / Tentativo 10 in WHATSAPP_INTEGRAZIONE.md.
# Riferimento doc Supabase:
# https://supabase.com/docs/guides/functions/auth-headers
# https://supabase.com/docs/guides/getting-started/migrating-to-new-api-keys
[functions.recupero-password]
verify_jwt = false

# admin-impersona-proprietario: chiamata SOLO da admin loggati (admin.html →
# sb.functions.invoke con sessione admin attiva). Richiede una sessione valida:
# verify_jwt=true rifiuta le chiamate anonime al gateway. Il JWT inviato e'
# l'access_token della sessione admin (JWT firmato da Supabase Auth), quindi
# supera verify_jwt. La function verifica poi che il chiamante sia in
# public.admins (403 altrimenti).
[functions.admin-impersona-proprietario]
verify_jwt = true

# invia-verifica-email: chiamata SOLO da proprietari appena auto-registrati
# (sessione valida). Genera un magic link di verifica per la propria email di
# accesso e lo invia via invia-email (server-to-server con SERVICE_KEY).
# verify_jwt=true: l'email da verificare è sempre quella del chiamante (letta
# dal JWT, mai dal body), quindi serve una sessione autenticata al gateway.
[functions.invia-verifica-email]
verify_jwt = true

# invia-whatsapp: chiamata sia da utenti loggati (frontend manager via
# inviaWhatsapp helper, e da richiedi-reset-cliente con user-JWT del
# manager) sia server-to-server da recupero-password con
# Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}.
#
# La env var SUPABASE_SERVICE_ROLE_KEY ora contiene una chiave nuovo
# formato `sb_secret_*` (NON JWT) per allinearsi alla migration delle
# nuove chiavi Supabase. Il gateway con verify_jwt=true rifiutava la
# chiamata server-to-server con UNAUTHORIZED_INVALID_JWT_FORMAT (visibile
# nei log Dashboard come "recupero-password WA invio fallito").
#
# La sicurezza e' garantita dal codice (vedi guard 401 in index.ts):
# - isServiceRole: string equality con SUPABASE_SERVICE_KEY env var,
#   funziona con qualsiasi formato di chiave
# - User JWT: validato via supa.auth.getUser(jwt) (ritorna 401 se invalido)
# - Anonimo: nuovo guard 401 esplicito (rifiuta chiamate senza auth)
# - Tipo recupero_password: ownership check sullo stabilimento per
#   chiamate user-JWT, bypass per chiamate service-role
#
# Vedi BUGFIX 5 giu 2026 / Tentativo 11 in WHATSAPP_INTEGRAZIONE.md.
[functions.invia-whatsapp]
verify_jwt = false
