name: Android debug APK

# Costruisce l'APK debug dell'app mobile (Capacitor) e lo pubblica come
# artefatto scaricabile. Pensato per il flusso "solo da mobile": parte a ogni
# push sul branch e si puo' lanciare a mano dall'app GitHub (workflow_dispatch).

on:
  push:
    branches:
      - claude/new-session-c9jh21
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dipendenze (mobile)
        working-directory: mobile
        run: npm install

      - name: Assembla web + sync Capacitor
        working-directory: mobile
        run: npm run cap:sync

      - name: Build APK debug
        working-directory: mobile/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Pubblica APK come artefatto
        uses: actions/upload-artifact@v4
        with:
          name: spiaggiamia-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
