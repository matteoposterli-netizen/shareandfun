name: Android release AAB

# Builda l'Android App Bundle (AAB) di RELEASE firmato e lo pubblica come
# artefatto scaricabile, da caricare su Play Console (Internal testing).
# Lancio manuale (workflow_dispatch), su tag v*, o su push del branch di lavoro.

on:
  workflow_dispatch:
  push:
    branches:
      - feat/android-release-signing
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Decodifica upload keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.jks"

      - name: Install dipendenze (mobile)
        working-directory: mobile
        run: npm install

      - name: Assembla web + sync Capacitor
        working-directory: mobile
        run: npm run cap:sync

      - name: Build AAB release firmato
        working-directory: mobile/android
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/upload.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease \
            -PappVersionCode=${{ github.run_number }} \
            -PappVersionName=1.0.${{ github.run_number }}

      - name: Pubblica AAB come artefatto
        uses: actions/upload-artifact@v4
        with:
          name: spiaggiamia-release-aab
          path: mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
