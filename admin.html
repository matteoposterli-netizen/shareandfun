<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin — SpiaggiaMia</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; }
  select, button, textarea, input { font-family: inherit; }
  .gate-wrap {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 40%, #f0fdf4 100%);
    padding: 24px;
  }
  .gate-card {
    background: white; border-radius: 14px; padding: 28px; max-width: 380px; width: 100%;
    box-shadow: 0 8px 32px rgba(3,105,161,0.15); border: 1px solid #bae6fd;
  }
  .gate-title { font-weight: bold; color: #0369a1; font-size: 20px; margin-bottom: 6px; }
  .gate-sub { color: #64748b; font-size: 13px; margin-bottom: 18px; }
  .gate-input {
    width: 100%; padding: 10px 12px; border: 1px solid #bae6fd; border-radius: 8px;
    font-size: 14px; margin-bottom: 10px; outline: none; color: #1e293b;
  }
  .gate-input:focus { border-color: #0ea5e9; }
  .gate-btn {
    width: 100%; padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer;
    background: linear-gradient(90deg, #0369a1, #0ea5e9); color: white; font-weight: bold;
    font-size: 14px; margin-top: 4px;
  }
  .gate-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
  .gate-err { color: #ef4444; font-size: 12px; margin-top: 10px; min-height: 16px; }
</style>
</head>
<body>

<!-- AUTH GATE -->
<div id="gate" class="gate-wrap">
  <div class="gate-card">
    <div class="gate-title">🔐 Admin — SpiaggiaMia</div>
    <div class="gate-sub">Area riservata agli amministratori di sistema.</div>
    <form id="gate-form" onsubmit="return false;">
      <input id="gate-email" class="gate-input" type="email" placeholder="Email admin" autocomplete="username" value="matteo.posterli+admin@gmail.com" />
      <input id="gate-password" class="gate-input" type="password" placeholder="Password" autocomplete="current-password" />
      <button id="gate-btn" class="gate-btn" type="submit">Accedi</button>
      <div id="gate-err" class="gate-err"></div>
    </form>
  </div>
</div>

<!-- BOARD ROOT (hidden until auth ok) -->
<div id="root" style="display:none"></div>

<script>
  // Stessa config di devboard.html (publishable key hardcoded).
  const SUPABASE_URL = 'https://btnyzzpibedkslhtiizu.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_7MGsfC7Pl9UAj76IphFMrw_Qk1II-DT';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  window.sb = sb;
  window.SUPABASE_URL = SUPABASE_URL;
  window.SUPABASE_KEY = SUPABASE_KEY;

  const gateEl = document.getElementById('gate');
  const rootEl = document.getElementById('root');
  const errEl = document.getElementById('gate-err');
  const btnEl = document.getElementById('gate-btn');
  const formEl = document.getElementById('gate-form');

  function showError(msg) { errEl.textContent = msg || ''; }
  function unlock() {
    gateEl.style.display = 'none';
    rootEl.style.display = 'block';
    if (window.__mountAdmin) window.__mountAdmin();
  }
  async function denyAndSignOut(msg) {
    await sb.auth.signOut();
    showError(msg);
    btnEl.disabled = false; btnEl.textContent = 'Accedi';
  }

  // Verifica che l'utente autenticato sia in public.admins.
  // La policy admins_self_select ritorna la riga solo se user_id = auth.uid().
  async function isAdminUser(userId) {
    const { data: adminRow, error } = await sb
      .from('admins').select('user_id').eq('user_id', userId).maybeSingle();
    if (error) return { ok: false, error };
    return { ok: !!adminRow };
  }

  // getSession all'avvio: se c'è già una sessione admin valida, sblocca senza
  // richiedere di nuovo il login (getSession() come al vecchio ?admin=1).
  async function checkSession() {
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user) {
      const res = await isAdminUser(session.user.id);
      if (res.ok) { unlock(); return true; }
    }
    return false;
  }

  formEl.addEventListener('submit', async () => {
    showError('');
    const email = document.getElementById('gate-email').value.trim().toLowerCase();
    const password = document.getElementById('gate-password').value;
    if (!email || !password) { showError('Inserisci email e password'); return; }
    btnEl.disabled = true; btnEl.textContent = 'Accesso...';
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      showError('Email o password errati');
      btnEl.disabled = false; btnEl.textContent = 'Accedi';
      return;
    }
    const res = await isAdminUser(data.user.id);
    if (!res.ok) {
      await denyAndSignOut('Accesso non autorizzato');
      return;
    }
    unlock();
  });

  checkSession();
</script>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

async function doLogout() {
  if (window.sb) await window.sb.auth.signOut();
  location.reload();
}

// ---- Helpers di formattazione --------------------------------------------
function fmtDate(iso) {
  if (!iso) return "—";
  try {
    return new Date(iso).toLocaleDateString("it-IT", { day: "numeric", month: "short", year: "numeric" });
  } catch { return "—"; }
}
function fmtDateShort(d) {
  if (!d) return null;
  try {
    return new Date(d).toLocaleDateString("it-IT", { day: "numeric", month: "short" });
  } catch { return null; }
}
function fmtCoin(n) {
  const v = Number(n) || 0;
  return v.toLocaleString("it-IT", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ---- Stili condivisi ------------------------------------------------------
const S = {
  page: { minHeight: "100vh", background: "linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 40%, #f0fdf4 100%)" },
  card: { background: "white", borderRadius: 12, boxShadow: "0 2px 12px rgba(14,165,233,0.08)", border: "1px solid #bae6fd" },
  badgeOn: { background: "#d1fae5", color: "#047857", fontSize: 11, fontWeight: "bold", padding: "2px 8px", borderRadius: 10 },
  badgeOff: { background: "#f1f5f9", color: "#94a3b8", fontSize: 11, fontWeight: "bold", padding: "2px 8px", borderRadius: 10 },
};

function AdminDashboard() {
  const [tab, setTab] = useState("panoramica");
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState("");
  const [data, setData] = useState({ stabilimenti: [], profiles: [], ombrelloni: [], clienti: [] });

  async function loadAll() {
    setLoading(true); setErr("");
    try {
      // Fetch completo delle 4 tabelle coperte da RLS admin (scala piccola:
      // poche decine di righe). Aggregazione lato client, come js/admin.js.
      const [stab, prof, omb, cli] = await Promise.all([
        sb.from("stabilimenti").select("*").limit(1000),
        sb.from("profiles").select("*").limit(1000),
        sb.from("ombrelloni").select("*").limit(1000),
        sb.from("clienti_stagionali").select("*").limit(1000),
      ]);
      const firstErr = stab.error || prof.error || omb.error || cli.error;
      if (firstErr) throw firstErr;
      setData({
        stabilimenti: stab.data || [],
        profiles: prof.data || [],
        ombrelloni: omb.data || [],
        clienti: cli.data || [],
      });
    } catch (e) {
      setErr((e && e.message) ? e.message : String(e));
    } finally {
      setLoading(false);
    }
  }

  useEffect(() => { loadAll(); }, []);

  // Aggiorna localmente lo stato di uno stabilimento (badge + KPI) senza
  // ricaricare tutto il dashboard dopo un'azione Approva/Rifiuta.
  function patchStab(id, patch) {
    setData(prev => ({
      ...prev,
      stabilimenti: prev.stabilimenti.map(s => s.id === id ? { ...s, ...patch } : s),
    }));
  }

  return (
    <div style={S.page}>
      <Header tab={tab} setTab={setTab} onReload={loadAll} loading={loading} />
      <div style={{ padding: "18px 20px 48px", maxWidth: 1200, margin: "0 auto" }}>
        {err && (
          <div style={{ ...S.card, borderColor: "#fecaca", padding: 14, marginBottom: 16, color: "#b91c1c", fontSize: 13 }}>
            ⚠️ Errore nel caricamento dati: {err}
          </div>
        )}
        {loading ? (
          <div style={{ textAlign: "center", color: "#64748b", padding: "60px 0", fontSize: 14 }}>
            <div style={{ fontSize: 40 }}>🌊</div>
            <div style={{ marginTop: 8 }}>Caricamento…</div>
          </div>
        ) : tab === "panoramica" ? (
          <Panoramica data={data} />
        ) : tab === "stabilimenti" ? (
          <Stabilimenti data={data} onPatchStab={patchStab} />
        ) : tab === "tabelle" ? (
          <Tabelle />
        ) : (
          <Log data={data} />
        )}
      </div>
    </div>
  );
}

function Header({ tab, setTab, onReload, loading }) {
  const tabs = [
    { id: "panoramica", label: "📊 Panoramica" },
    { id: "stabilimenti", label: "🏖️ Stabilimenti" },
    { id: "tabelle", label: "🗄️ Tabelle" },
    { id: "log", label: "📋 Log" },
  ];
  return (
    <div style={{ background: "linear-gradient(90deg, #0369a1, #0ea5e9)", padding: "14px 20px", boxShadow: "0 2px 12px rgba(3,105,161,0.3)" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap", maxWidth: 1200, margin: "0 auto" }}>
        <span style={{ fontSize: 24 }}>🔐</span>
        <div>
          <div style={{ color: "white", fontWeight: "bold", fontSize: 18, letterSpacing: 0.5 }}>Admin</div>
          <div style={{ color: "#bae6fd", fontSize: 12 }}>SpiaggiaMia — vista di piattaforma</div>
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{ background: tab === t.id ? "white" : "rgba(255,255,255,0.2)", color: tab === t.id ? "#0369a1" : "white", border: "none", borderRadius: 6, padding: "5px 12px", cursor: "pointer", fontSize: 12, fontWeight: "bold" }}>
              {t.label}
            </button>
          ))}
          <button onClick={onReload} disabled={loading} title="Ricarica"
            style={{ background: "rgba(255,255,255,0.15)", color: "white", border: "1px solid rgba(255,255,255,0.3)", borderRadius: 6, padding: "5px 10px", cursor: loading ? "not-allowed" : "pointer", fontSize: 12 }}>
            🔄
          </button>
          <button onClick={doLogout} title="Esci"
            style={{ background: "rgba(255,255,255,0.15)", color: "white", border: "1px solid rgba(255,255,255,0.3)", borderRadius: 6, padding: "5px 10px", cursor: "pointer", fontSize: 12 }}>
            🚪 Esci
          </button>
        </div>
      </div>
    </div>
  );
}

// ---- Aggregazioni ---------------------------------------------------------
function computeStats(data) {
  const { stabilimenti, profiles, ombrelloni, clienti } = data;
  const proprietari = profiles.filter(p => p.ruolo === "proprietario").length;
  const stagionali = profiles.filter(p => p.ruolo === "stagionale").length;
  const creditoTot = clienti.reduce((s, c) => s + (Number(c.credito_saldo) || 0), 0);
  const waOn = stabilimenti.filter(s => s.wa_enabled).length;
  const ombAttivi = ombrelloni.filter(o => o.attivo).length;
  const inAttesa = clienti.filter(c => !c.approvato && !c.rifiutato).length;
  const stabInAttesa = stabilimenti.filter(s => !s.approvato && !s.rifiutato).length;
  return {
    totStab: stabilimenti.length,
    proprietari, stagionali,
    creditoTot,
    waOn, waTot: stabilimenti.length,
    ombAttivi, ombTot: ombrelloni.length,
    clientiTot: clienti.length,
    inAttesa,
    stabInAttesa,
  };
}

// Riepilogo per singolo stabilimento (usato nella tab Stabilimenti).
function perStabilimento(data) {
  const { stabilimenti, profiles, ombrelloni, clienti } = data;
  const profById = new Map(profiles.map(p => [p.id, p]));
  return stabilimenti.map(s => {
    const omb = ombrelloni.filter(o => o.stabilimento_id === s.id);
    const cli = clienti.filter(c => c.stabilimento_id === s.id);
    const owner = s.proprietario_id ? profById.get(s.proprietario_id) : null;
    return {
      ...s,
      _owner: owner ? `${owner.nome || ""} ${owner.cognome || ""}`.trim() || "—" : "—",
      _ombTot: omb.length,
      _ombAttivi: omb.filter(o => o.attivo).length,
      _cliTot: cli.length,
      _cliApprovati: cli.filter(c => c.approvato && !c.rifiutato).length,
      _cliAttesa: cli.filter(c => !c.approvato && !c.rifiutato).length,
      _cliRifiutati: cli.filter(c => c.rifiutato).length,
      _credito: cli.reduce((sum, c) => sum + (Number(c.credito_saldo) || 0), 0),
    };
  });
}

// ---- Tab Panoramica -------------------------------------------------------
function KpiCard({ label, value, sub, accent }) {
  return (
    <div style={{ ...S.card, padding: "16px 18px" }}>
      <div style={{ color: "#64748b", fontSize: 12, marginBottom: 6, fontWeight: "bold", textTransform: "uppercase", letterSpacing: 0.4 }}>{label}</div>
      <div style={{ color: accent || "#0369a1", fontSize: 30, fontWeight: "bold", lineHeight: 1.1 }}>{value}</div>
      {sub && <div style={{ color: "#94a3b8", fontSize: 12, marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

function Panoramica({ data }) {
  const k = useMemo(() => computeStats(data), [data]);
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 14 }}>
      <KpiCard label="Stabilimenti" value={k.totStab} />
      <KpiCard label="Stabilimenti in attesa" value={k.stabInAttesa} sub="approvato=false, rifiutato=false" accent="#f59e0b" />
      <KpiCard label="Proprietari" value={k.proprietari} accent="#0ea5e9" />
      <KpiCard label="Stagionali" value={k.stagionali} accent="#0ea5e9" />
      <KpiCard label="Credito in circolazione" value={fmtCoin(k.creditoTot)} sub="somma saldi clienti" accent="#f59e0b" />
      <KpiCard label="WhatsApp attivo" value={`${k.waOn} / ${k.waTot}`} sub="stabilimenti con notifiche WA" accent="#10b981" />
      <KpiCard label="Ombrelloni" value={`${k.ombAttivi} / ${k.ombTot}`} sub="attivi su totali" accent="#0369a1" />
      <KpiCard label="Clienti in attesa" value={k.inAttesa} sub="approvato=false, rifiutato=false" accent="#ef4444" />
      <KpiCard label="Clienti stagionali" value={k.clientiTot} sub="totale piattaforma" accent="#0ea5e9" />
    </div>
  );
}

// ---- Tab Stabilimenti -----------------------------------------------------
function Stabilimenti({ data, onPatchStab }) {
  const rows = useMemo(() => perStabilimento(data), [data]);
  const [q, setQ] = useState("");
  const [expanded, setExpanded] = useState(null);

  const filtered = useMemo(() => {
    const needle = q.trim().toLowerCase();
    if (!needle) return rows;
    return rows.filter(r =>
      (r.nome || "").toLowerCase().includes(needle) ||
      (r.citta || "").toLowerCase().includes(needle)
    );
  }, [rows, q]);

  return (
    <div>
      <div style={{ marginBottom: 14, display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
        <input value={q} onChange={e => setQ(e.target.value)} placeholder="Cerca per nome o città…"
          style={{ flex: "1 1 240px", maxWidth: 340, border: "1px solid #bae6fd", borderRadius: 8, padding: "9px 12px", fontSize: 14, outline: "none", color: "#1e293b" }} />
        <span style={{ color: "#64748b", fontSize: 12 }}>{filtered.length} stabiliment{filtered.length === 1 ? "o" : "i"}</span>
      </div>

      <div style={{ ...S.card, overflow: "hidden" }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ borderCollapse: "collapse", width: "100%", minWidth: 720, fontSize: 13 }}>
            <thead>
              <tr style={{ background: "#f0f9ff", color: "#0369a1", textAlign: "left" }}>
                <th style={thStyle}>Stabilimento</th>
                <th style={thStyle}>Proprietario</th>
                <th style={thStyle}>Creato</th>
                <th style={thStyle}>Ombrelloni</th>
                <th style={thStyle}>Clienti</th>
                <th style={thStyle}>Credito</th>
                <th style={thStyle}>WhatsApp</th>
                <th style={thStyle}>Stagione</th>
                <th style={thStyle}>Stato</th>
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 && (
                <tr><td colSpan={9} style={{ padding: "30px 12px", textAlign: "center", color: "#94a3b8" }}>Nessun risultato.</td></tr>
              )}
              {filtered.map(r => (
                <StabRow key={r.id} r={r} expanded={expanded === r.id} onToggle={() => setExpanded(expanded === r.id ? null : r.id)} onPatchStab={onPatchStab} />
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

const thStyle = { padding: "10px 12px", fontSize: 11, fontWeight: "bold", textTransform: "uppercase", letterSpacing: 0.4, borderBottom: "1px solid #e0f2fe", whiteSpace: "nowrap" };
const tdStyle = { padding: "10px 12px", borderBottom: "1px solid #f1f5f9", verticalAlign: "top", color: "#1e293b" };

function StabRow({ r, expanded, onToggle, onPatchStab }) {
  const stagione = (r.data_inizio_stagione && r.data_fine_stagione)
    ? `${fmtDateShort(r.data_inizio_stagione)} – ${fmtDateShort(r.data_fine_stagione)}`
    : "—";
  return (
    <>
      <tr onClick={onToggle} style={{ cursor: "pointer", background: expanded ? "#f8fafc" : "white" }}>
        <td style={tdStyle}>
          <div style={{ fontWeight: "bold", color: "#0369a1" }}>{r.nome || "—"}</div>
          <div style={{ color: "#94a3b8", fontSize: 12 }}>{r.citta || "—"}</div>
        </td>
        <td style={tdStyle}>{r._owner}</td>
        <td style={{ ...tdStyle, whiteSpace: "nowrap" }}>{fmtDate(r.created_at)}</td>
        <td style={tdStyle}>{r._ombAttivi}/{r._ombTot}</td>
        <td style={tdStyle}>
          <span title="approvati / in attesa / rifiutati / totali">
            {r._cliApprovati}/{r._cliAttesa}/{r._cliRifiutati}/{r._cliTot}
          </span>
        </td>
        <td style={{ ...tdStyle, whiteSpace: "nowrap" }}>{fmtCoin(r._credito)}</td>
        <td style={tdStyle}>
          <span style={r.wa_enabled ? S.badgeOn : S.badgeOff}>{r.wa_enabled ? "attivo" : "non attivo"}</span>
        </td>
        <td style={{ ...tdStyle, whiteSpace: "nowrap" }}>{stagione}</td>
        <td style={tdStyle} onClick={e => e.stopPropagation()}>
          <StabStatoCell r={r} onPatchStab={onPatchStab} />
        </td>
      </tr>
      {expanded && (
        <tr>
          <td colSpan={9} style={{ padding: "0 12px 14px", background: "#f8fafc", borderBottom: "1px solid #f1f5f9" }}>
            <StabDetail r={r} stagione={stagione} />
          </td>
        </tr>
      )}
    </>
  );
}

// Cella "Stato" della tabella Stabilimenti: badge 🟡/🟢/🔴 + azioni
// Approva/Rifiuta per gli stabilimenti in attesa. L'UPDATE passa da sb
// (RLS admin, stesso client del resto della pagina); l'email di esito al
// proprietario e' fire-and-forget via invia-email (tipo stabilimento_*).
function StabStatoCell({ r, onPatchStab }) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");

  const inAttesa = !r.approvato && !r.rifiutato;
  const badge = r.rifiutato
    ? { txt: "🔴 Rifiutato", bg: "#fee2e2", color: "#b91c1c" }
    : r.approvato
      ? { txt: "🟢 Approvato", bg: "#d1fae5", color: "#047857" }
      : { txt: "🟡 In attesa", bg: "#fef3c7", color: "#92400e" };

  async function decide(approva) {
    setErr("");
    const owner = r._owner || "il proprietario";
    const stabNome = r.nome || "questo stabilimento";
    const azione = approva ? "APPROVARE" : "RIFIUTARE";
    if (!window.confirm(
      `${azione} lo stabilimento?\n\n` +
      `Stabilimento: ${stabNome}\n` +
      `Proprietario: ${owner}\n\n` +
      (approva
        ? `Il proprietario potrà accedere subito alla piattaforma e riceverà un'email di conferma.`
        : `Il proprietario non potrà accedere e riceverà un'email di esito.`)
    )) return;

    setBusy(true);
    const patch = approva ? { approvato: true, rifiutato: false } : { approvato: false, rifiutato: true };
    const { error } = await sb.from("stabilimenti").update(patch).eq("id", r.id);
    if (error) { setErr(error.message); setBusy(false); return; }

    // Stato locale aggiornato (badge + KPI Panoramica derivano da data.stabilimenti).
    if (onPatchStab) onPatchStab(r.id, patch);

    // Fire-and-forget: email di esito al proprietario. invia-email risolve
    // l'email del proprietario da proprietario_id (non leggibile client-side).
    try {
      sb.functions.invoke("invia-email", {
        body: {
          tipo: approva ? "stabilimento_approvato" : "stabilimento_rifiutato",
          proprietario_id: r.proprietario_id,
          nome: (r._owner && r._owner !== "—") ? r._owner.split(" ")[0] : "",
          stabilimento_id: r.id,
          stabilimento_nome: r.nome || "",
        },
      }).catch(e => console.warn("email esito stabilimento (non blocking)", e));
    } catch (e) { console.warn("email esito stabilimento (non blocking)", e); }

    setBusy(false);
  }

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6, alignItems: "flex-start" }}>
      <span style={{ background: badge.bg, color: badge.color, fontSize: 11, fontWeight: "bold", padding: "2px 8px", borderRadius: 10, whiteSpace: "nowrap" }}>
        {badge.txt}

            ❌ Rifiuta
          </button>
        </div>
      )}
      {err && <span style={{ color: "#ef4444", fontSize: 11 }}>{err}</span>}
    </div>
  );
}

// Pulsante "Entra come proprietario": chiama la Edge Function
// admin-impersona-proprietario, che genera un magic link per lo stabilimento;
// il link viene aperto in una NUOVA scheda (window.open) così la scheda admin
// corrente resta autenticata come admin.
function ImpersonaButton({ r }) {
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");

  const owner = r._owner || "il proprietario";
  const stabNome = r.nome || "questo stabilimento";
  const canImpersonate = !!r.proprietario_id;

  async function handleClick() {
    setErr("");
    if (!canImpersonate) {
      setErr("Nessun proprietario associato a questo stabilimento.");
      return;
    }
    const ok = window.confirm(
      `Entrare come proprietario?\n\n` +
      `Aprirai una NUOVA scheda con una sessione reale (scrivibile) come ` +
      `${owner}, nel contesto di "${stabNome}".\n\n` +
      `La scheda admin corrente resterà autenticata come admin.`
    );
    if (!ok) return;
    setLoading(true);
    try {
      const { data, error } = await sb.functions.invoke("admin-impersona-proprietario", {
        body: { stabilimento_id: r.id, redirect_origin: location.origin },
      });
      if (error) throw error;
      if (!data || !data.link) {
        throw new Error((data && data.error) || "Risposta non valida dalla function.");
      }
      window.open(data.link, "_blank");
    } catch (e) {
      console.error("Impersonazione fallita", e);
      setErr(e?.message || "Impossibile avviare la sessione impersonata.");
    } finally {
      setLoading(false);
    }
  }

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
      <button
        onClick={handleClick}
        disabled={loading || !canImpersonate}
        title={canImpersonate ? "Apri una sessione reale come il proprietario in una nuova scheda" : "Nessun proprietario associato"}
        style={{
          background: (loading || !canImpersonate) ? "#f1f5f9" : "#0369a1",
          color: (loading || !canImpersonate) ? "#94a3b8" : "white",
          border: "1px solid " + ((loading || !canImpersonate) ? "#e2e8f0" : "#0369a1"),
          borderRadius: 8, padding: "7px 14px",
          cursor: (loading || !canImpersonate) ? "not-allowed" : "pointer",
          fontSize: 12, fontWeight: "bold",
        }}>
        {loading ? "Avvio in corso…" : "Entra come proprietario"}
      </button>
      {err && <span style={{ color: "#ef4444", fontSize: 12 }}>{err}</span>}
    </div>
  );
}

  if (v === null || v === undefined) return <span style={{ color: "#cbd5e1" }}>—</span>;
  if (typeof v === "boolean") return v ? "✓" : "✗";
  const s = String(v);
  return s.length > 60 ? s.slice(0, 57) + "…" : s;
}

function Tabelle() {
  const [table, setTable] = useState("profiles");
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);

  const [editing, setEditing] = useState(null); // { row } (row=null → nuova riga) | null

  async function loadTable(tableName) {
    setLoading(true); setErr("");
    const sch = ADMIN_TABLES[tableName];
    let query = sb.from(tableName).select("*");
    if (sch.orderBy) query = query.order(sch.orderBy.column, { ascending: sch.orderBy.ascending });
    query = query.limit(1000);
    const { data, error } = await query;
    if (error) { setErr(`Errore caricamento: ${error.message}`); setRows([]); setLoading(false); return; }
    setRows(data || []);
    setLoading(false);
  }

  useEffect(() => { setQ(""); loadTable(table); }, [table]);

  const filtered = useMemo(() => {
    const needle = q.trim().toLowerCase();
    if (!needle) return rows;
    return rows.filter(r => schema.list.some(c => String(r[c] ?? "").toLowerCase().includes(needle)));
  }, [rows, q, schema]);

    const pkVal = row[schema.pk];

                  ))}

      )}

  );

function RowEditor({ table, schema, row, onClose, onSaved }) {
  const isEdit = !!row;
  const [form, setForm] = useState(() => {
    const init = {};
    schema.fields.forEach(f => {
      const v = row ? row[f.name] : undefined;
      if (f.type === "bool") init[f.name] = v === true;
      else init[f.name] = v == null ? "" : String(v);
    });
    return init;
  });
  const [err, setErr] = useState("");
  const [saving, setSaving] = useState(false);

  function setField(name, value) { setForm(prev => ({ ...prev, [name]: value })); }

  function collectPayload() {
    const payload = {};
    for (const f of schema.fields) {
      if (f.readonly && isEdit) continue; // non inviare readonly in update
      let v = form[f.name];
      if (f.type === "bool") { payload[f.name] = !!v; continue; }
      if (v === "" || v == null) {
        if (f.readonly && !isEdit) continue; // non inviare pk vuota in insert
        v = null;
      }
      if (f.type === "number" && v != null) v = Number(v);
      payload[f.name] = v;
    }
    return payload;
  }

  async function save() {
    setErr("");
    for (const f of schema.fields) {
      if (!f.required) continue;
      if (f.readonly && !isEdit) continue;
      const val = form[f.name];
      if (val === null || val === undefined || val === "") {
        setErr(`Il campo "${f.name}" è obbligatorio.`);
        return;
      }
    }
    setSaving(true);
    const payload = collectPayload();
    let error;
    if (isEdit) {
      const { error: e } = await sb.from(table).update(payload).eq(schema.pk, row[schema.pk]);
      error = e;
    } else {
      const { error: e } = await sb.from(table).insert(payload);
      error = e;
    }
    if (error) { setErr(`Errore: ${error.message}`); setSaving(false); return; }
    setSaving(false);
    onSaved();
  }

  const labelStyle = { display: "block", fontSize: 13, fontWeight: "bold", color: "#334155", marginBottom: 4 };
  const helpStyle = { fontSize: 12, color: "#94a3b8", marginTop: 2 };

  return (
    <div onClick={onClose}
      style={{ position: "fixed", inset: 0, background: "rgba(15,23,42,0.5)", display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "40px 16px", overflowY: "auto", zIndex: 1000 }}>
      <div onClick={e => e.stopPropagation()}
        style={{ ...S.card, background: "white", maxWidth: 640, width: "100%", padding: 24 }}>
        <div style={{ fontWeight: "bold", color: "#0369a1", fontSize: 18, marginBottom: 2 }}>
          {isEdit ? `✏️ Modifica ${schema.label}` : `+ Nuova riga in ${schema.label}`}
        </div>
        <div style={{ color: "#94a3b8", fontSize: 12, marginBottom: 16 }}>
          {isEdit ? `${schema.pk}: ${row[schema.pk]}` : schema.desc}
        </div>
        {err && (
          <div style={{ background: "#fef2f2", border: "1px solid #fecaca", borderRadius: 8, padding: 10, marginBottom: 14, color: "#b91c1c", fontSize: 13 }}>
            {err}
          </div>
        )}
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {schema.fields.map(f => {
            // In creazione la pk auto-generata resta nascosta (default Postgres).
            if (f.readonly && !isEdit && f.name === schema.pk) return null;
            const readOnly = f.readonly && isEdit;
            const req = f.required ? <span style={{ color: "#c0392b" }}> *</span> : null;
            const val = form[f.name];
            if (f.type === "textarea") {
              return (
                <div key={f.name}>
                  <label style={labelStyle}>{f.name}{req}</label>
                  <textarea value={val} readOnly={readOnly} onChange={e => setField(f.name, e.target.value)}
                    rows={3} style={{ ...inputStyle, resize: "vertical" }} />
                  {f.help && <div style={helpStyle}>{f.help}</div>}
                </div>
              );
            }
            if (f.type === "bool") {
              return (
                <div key={f.name}>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", fontSize: 13, fontWeight: "bold", color: "#334155" }}>
                    <input type="checkbox" checked={!!val} onChange={e => setField(f.name, e.target.checked)} />
                    <span>{f.name}{req}</span>
                  </label>
                  {f.help && <div style={helpStyle}>{f.help}</div>}
                </div>
              );
            }
            if (f.type === "select") {
              return (
                <div key={f.name}>
                  <label style={labelStyle}>{f.name}{req}</label>
                  <select value={val} disabled={readOnly} onChange={e => setField(f.name, e.target.value)} style={inputStyle}>
                    <option value="">(null)</option>
                    {f.options.map(o => <option key={o} value={o}>{o}</option>)}
                  </select>
                  {f.help && <div style={helpStyle}>{f.help}</div>}
                </div>
              );
            }
            const inputType = f.type === "number" ? "number" : (f.type === "date" ? "date" : "text");
            return (
              <div key={f.name}>
                <label style={labelStyle}>{f.name}{req}</label>
                <input type={inputType} value={val} readOnly={readOnly} step={f.step}
                  onChange={e => setField(f.name, e.target.value)} style={inputStyle} />
                {f.help && <div style={helpStyle}>{f.help}</div>}
              </div>
            );
          })}
        </div>
        <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 20 }}>
          <button onClick={onClose} disabled={saving}
            style={{ background: "white", color: "#64748b", border: "1px solid #cbd5e1", borderRadius: 8, padding: "8px 16px", cursor: saving ? "not-allowed" : "pointer", fontSize: 13, fontWeight: "bold" }}>
            Annulla
          </button>
          <button onClick={save} disabled={saving}
            style={{ background: saving ? "#cbd5e1" : "linear-gradient(90deg, #0369a1, #0ea5e9)", color: "white", border: "none", borderRadius: 8, padding: "8px 18px", cursor: saving ? "not-allowed" : "pointer", fontSize: 13, fontWeight: "bold" }}>
            {saving ? "Salvataggio…" : "Salva"}
          </button>
        </div>
      </div>
    </div>
  );
}

const AUDIT_ENTITY_LABELS = {
  transazione: "Transazione credito",
  disponibilita: "Prenotazione / Disponibilità",
  cliente_stagionale: "Cliente stagionale",
  ombrellone: "Ombrellone",

  auth: "Accesso",
  import: "Import batch",

};
const AUDIT_ACTION_LABELS = {

  update: "Modifica",
  delete: "Eliminazione",
  login: "Login",

  email_batch_sent: "Email broadcast",

};
const AUDIT_PAGE_SIZES = [30, 50, 100];

function auditExtractInvolvedIds(row) {
  const a = row.after || {};
  const b = row.before || {};
  let ombrelloneId = a.ombrellone_id || b.ombrellone_id || null;
  let clienteId = a.cliente_id || b.cliente_id || null;
  if (row.entity_type === "ombrellone" && row.entity_id) ombrelloneId = ombrelloneId || row.entity_id;
  if (row.entity_type === "cliente_stagionale" && row.entity_id) clienteId = clienteId || row.entity_id;
  return { ombrelloneId, clienteId };
}

function daysAgoIso(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.toISOString().slice(0, 10);
}
function todayIso() { return new Date().toISOString().slice(0, 10); }

const DEFAULT_AUDIT_FILTERS = () => ({
  stabId: "", from: daysAgoIso(7), to: todayIso(),
  actorType: "", entityType: "", action: "", search: "",
});

// Wrapper con toggle Audit / WhatsApp. Entrambe le sotto-viste sono

function LogAudit({ data }) {
  // Lookup dalle anagrafiche globali già caricate dal dashboard.
  const stabById = useMemo(() => new Map((data.stabilimenti || []).map(s => [s.id, s])), [data.stabilimenti]);
  const ombById = useMemo(() => new Map((data.ombrelloni || []).map(o => [o.id, o])), [data.ombrelloni]);
  const cliById = useMemo(() => new Map((data.clienti || []).map(c => [c.id, c])), [data.clienti]);

  const [filters, setFilters] = useState(DEFAULT_AUDIT_FILTERS);
  const [applied, setApplied] = useState(DEFAULT_AUDIT_FILTERS);
  const [page, setPage] = useState(1);
  const [pageSize, setPageSize] = useState(30);
  const [rows, setRows] = useState([]);
  const [count, setCount] = useState(0);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState("");
  const [expanded, setExpanded] = useState(() => new Set());
  const [exporting, setExporting] = useState(false);

  function setFilter(k, v) { setFilters(prev => ({ ...prev, [k]: v })); }

  function buildQuery(f, withCount) {
    let q = sb.from("audit_log").select("*", withCount ? { count: "exact" } : undefined);
    if (f.stabId) q = q.eq("stabilimento_id", f.stabId);
    if (f.from) q = q.gte("created_at", `${f.from}T00:00:00`);
    if (f.to) q = q.lte("created_at", `${f.to}T23:59:59.999`);
    if (f.actorType) q = q.eq("actor_type", f.actorType);
    if (f.entityType) q = q.eq("entity_type", f.entityType);
    if (f.action) q = q.eq("action", f.action);
    if (f.search) {
      const s = f.search.trim().replace(/[%_]/g, m => "\\" + m);
      q = q.or(`description.ilike.%${s}%,actor_label.ilike.%${s}%`);
    }
    return q.order("created_at", { ascending: false });
  }

  async function load(f, pg, size) {
    setLoading(true); setErr("");
    const from = (pg - 1) * size;
    const to = from + size - 1;
    const { data: d, count: c, error } = await buildQuery(f, true).range(from, to);
    if (error) { setErr(error.message); setRows([]); setCount(0); setLoading(false); return; }
    setRows(d || []); setCount(c || 0); setExpanded(new Set()); setLoading(false);
  }

  useEffect(() => { load(applied, page, pageSize); }, [applied, page, pageSize]);

  function applyFilters() { setApplied({ ...filters }); setPage(1); }
  function resetFilters() {
    const def = DEFAULT_AUDIT_FILTERS();
    setFilters(def); setApplied(def); setPage(1);
  }

  function stabLabel(id) {
    const s = stabById.get(id);
    return s ? (s.nome || "—") : (id ? id.slice(0, 8) : "—");
  }
  function involvedParts(row) {
    const { ombrelloneId, clienteId } = auditExtractInvolvedIds(row);
    const parts = [];
    if (ombrelloneId) {
      const o = ombById.get(ombrelloneId);
      parts.push({ icon: "⛱", txt: o ? o.codice : "Ombrellone eliminato" });
    }
    if (clienteId) {
      const c = cliById.get(clienteId);
      const lbl = c ? (`${c.nome || ""} ${c.cognome || ""}`.trim() || c.email || "–") : "Cliente eliminato";
      parts.push({ icon: "👤", txt: lbl });
    }
    return parts;
  }

  async function exportXlsx() {
    setExporting(true); setErr("");
    try {
      const CHUNK = 1000;
      let offset = 0; const all = [];
      while (true) {
        const { data: d, error } = await buildQuery(applied, false).range(offset, offset + CHUNK - 1);
        if (error) throw error;
        if (!d || !d.length) break;
        all.push(...d);
        if (d.length < CHUNK) break;
        offset += CHUNK;
        if (all.length > 50000) break;
      }
      const out = all.map(r => {
        const inv = involvedParts(r).map(p => p.txt).join(" · ");
        return {
          Data: new Date(r.created_at).toLocaleString("it-IT"),
          Stabilimento: stabLabel(r.stabilimento_id),
          Attore: r.actor_label || "",
          "Tipo attore": AUDIT_ACTOR_LABELS[r.actor_type] || r.actor_type,
          Entità: AUDIT_ENTITY_LABELS[r.entity_type] || r.entity_type,
          Azione: AUDIT_ACTION_LABELS[r.action] || r.action,
          Coinvolto: inv,
          Descrizione: r.description || "",
          "ID entità": r.entity_id || "",
          Before: r.before ? JSON.stringify(r.before) : "",
          After: r.after ? JSON.stringify(r.after) : "",
          Diff: r.diff ? JSON.stringify(r.diff) : "",
        };
      });
      const ws = XLSX.utils.json_to_sheet(out);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Log attività");
      const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
      XLSX.writeFile(wb, `audit-log-${ts}.xlsx`);
    } catch (e) {
      setErr("Export fallito: " + (e && e.message ? e.message : String(e)));
    } finally {
      setExporting(false);
    }
  }

  const totalPages = Math.max(1, Math.ceil(count / pageSize));
  const fromN = count === 0 ? 0 : (page - 1) * pageSize + 1;
  const toN = Math.min(page * pageSize, count);

  const selStyle = { ...inputStyle, width: "auto", minWidth: 130, padding: "7px 9px" };
  const filterLabel = { display: "block", fontSize: 11, fontWeight: "bold", color: "#64748b", textTransform: "uppercase", letterSpacing: 0.3, marginBottom: 3 };

  const actorOptions = Object.keys(AUDIT_ACTOR_LABELS);
  const entityOptions = Object.keys(AUDIT_ENTITY_LABELS);
  const actionOptions = Object.keys(AUDIT_ACTION_LABELS);

  return (
    <div>
      {/* Filtri */}
      <div style={{ ...S.card, padding: 16, marginBottom: 14 }}>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "flex-end" }}>
          <div>
            <label style={filterLabel}>Stabilimento</label>
            <select value={filters.stabId} onChange={e => setFilter("stabId", e.target.value)} style={selStyle}>
              <option value="">Tutti</option>
              {(data.stabilimenti || []).slice().sort((a, b) => (a.nome || "").localeCompare(b.nome || "", "it")).map(s => (
                <option key={s.id} value={s.id}>{s.nome || s.id.slice(0, 8)}</option>
              ))}
            </select>
          </div>
          <div>
            <label style={filterLabel}>Dal</label>
            <input type="date" value={filters.from} onChange={e => setFilter("from", e.target.value)} style={{ ...selStyle, minWidth: 0 }} />
          </div>
          <div>
            <label style={filterLabel}>Al</label>
            <input type="date" value={filters.to} onChange={e => setFilter("to", e.target.value)} style={{ ...selStyle, minWidth: 0 }} />
          </div>
          <div>
            <label style={filterLabel}>Tipo attore</label>
            <select value={filters.actorType} onChange={e => setFilter("actorType", e.target.value)} style={selStyle}>
              <option value="">Tutti</option>
              {actorOptions.map(a => <option key={a} value={a}>{AUDIT_ACTOR_LABELS[a]}</option>)}
            </select>
          </div>
          <div>
            <label style={filterLabel}>Entità</label>
            <select value={filters.entityType} onChange={e => setFilter("entityType", e.target.value)} style={selStyle}>
              <option value="">Tutte</option>
              {entityOptions.map(en => <option key={en} value={en}>{AUDIT_ENTITY_LABELS[en]}</option>)}
            </select>
          </div>
          <div>
            <label style={filterLabel}>Azione</label>
            <select value={filters.action} onChange={e => setFilter("action", e.target.value)} style={selStyle}>
              <option value="">Tutte</option>
              {actionOptions.map(ac => <option key={ac} value={ac}>{AUDIT_ACTION_LABELS[ac]}</option>)}
            </select>
          </div>
          <div style={{ flex: "1 1 180px" }}>
            <label style={filterLabel}>Cerca (descrizione / attore)</label>
            <input type="text" value={filters.search} onChange={e => setFilter("search", e.target.value)}
              onKeyDown={e => { if (e.key === "Enter") applyFilters(); }}
              placeholder="testo libero…" style={{ ...inputStyle, padding: "7px 9px" }} />
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={applyFilters}
              style={{ background: "linear-gradient(90deg, #0369a1, #0ea5e9)", color: "white", border: "none", borderRadius: 8, padding: "8px 16px", cursor: "pointer", fontSize: 13, fontWeight: "bold" }}>
              Applica
            </button>
            <button onClick={resetFilters}
              style={{ background: "white", color: "#64748b", border: "1px solid #cbd5e1", borderRadius: 8, padding: "8px 12px", cursor: "pointer", fontSize: 13, fontWeight: "bold" }}>
              Azzera
            </button>
          </div>
        </div>
      </div>

      {/* Barra conteggio + export + page size */}
      <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", marginBottom: 12 }}>
        <span style={{ color: "#64748b", fontSize: 13 }}>
          {loading ? "Caricamento…" : `${fromN}–${toN} di ${count} eventi`}
        </span>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8, alignItems: "center" }}>
          <label style={{ color: "#64748b", fontSize: 12 }}>Per pagina</label>
          <select value={pageSize} onChange={e => { setPageSize(Number(e.target.value)); setPage(1); }} style={{ ...selStyle, minWidth: 0, padding: "6px 8px" }}>
            {AUDIT_PAGE_SIZES.map(s => <option key={s} value={s}>{s}</option>)}
          </select>
          <button onClick={exportXlsx} disabled={exporting || count === 0}
            style={{ background: "white", color: "#0369a1", border: "1px solid #bae6fd", borderRadius: 8, padding: "7px 12px", cursor: (exporting || count === 0) ? "not-allowed" : "pointer", fontSize: 13, fontWeight: "bold" }}>
            {exporting ? "Export…" : "📥 Esporta Excel"}
          </button>
        </div>
      </div>

      {err && (
        <div style={{ ...S.card, borderColor: "#fecaca", padding: 12, marginBottom: 14, color: "#b91c1c", fontSize: 13 }}>⚠️ {err}</div>
      )}

      <div style={{ ...S.card, overflow: "hidden" }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ borderCollapse: "collapse", width: "100%", minWidth: 860, fontSize: 13 }}>
            <thead>
              <tr style={{ background: "#f0f9ff", color: "#0369a1", textAlign: "left" }}>
                <th style={thStyle}>Data</th>
                <th style={thStyle}>Stabilimento</th>
                <th style={thStyle}>Attore</th>
                <th style={thStyle}>Entità / Azione</th>
                <th style={thStyle}>Coinvolto</th>
                <th style={thStyle}>Descrizione</th>
                <th style={{ ...thStyle, textAlign: "right" }}></th>
              </tr>
            </thead>
            <tbody>
              {loading ? (
                <tr><td colSpan={7} style={{ padding: "30px 12px", textAlign: "center", color: "#94a3b8" }}>Caricamento…</td></tr>
              ) : rows.length === 0 ? (
                <tr><td colSpan={7} style={{ padding: "30px 12px", textAlign: "center", color: "#94a3b8" }}>Nessun evento nel periodo/filtri selezionati</td></tr>
              ) : rows.map(row => {
                const dt = new Date(row.created_at).toLocaleString("it-IT", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit", second: "2-digit" });
                const actionColor = row.action === "delete" ? "#c0392b" : row.action === "insert" ? "#047857" : (row.action === "email_sent" || row.action === "email_batch_sent") ? "#1B6CA8" : "#64748b";
                const isOpen = expanded.has(row.id);
                const inv = involvedParts(row);
                return (
                  <React.Fragment key={row.id}>
                    <tr>
                      <td style={{ ...tdStyle, whiteSpace: "nowrap", fontVariantNumeric: "tabular-nums", color: "#64748b", fontSize: 12 }}>{dt}</td>
                      <td style={tdStyle}><span style={{ fontWeight: 600, color: "#0369a1" }}>{stabLabel(row.stabilimento_id)}</span></td>
                      <td style={tdStyle}>
                        <div>{row.actor_label || AUDIT_ACTOR_LABELS[row.actor_type] || "–"}</div>
                        <div style={{ fontSize: 11, color: "#94a3b8" }}>{AUDIT_ACTOR_LABELS[row.actor_type] || row.actor_type}</div>
                      </td>
                      <td style={tdStyle}>
                        <div>{AUDIT_ENTITY_LABELS[row.entity_type] || row.entity_type}</div>
                        <span style={{ color: actionColor, fontSize: 11, fontWeight: 600 }}>{AUDIT_ACTION_LABELS[row.action] || row.action}</span>
                      </td>
                      <td style={tdStyle}>
                        {inv.length === 0 ? <span style={{ color: "#cbd5e1" }}>–</span> : inv.map((p, i) => (
                          <div key={i} style={{ fontSize: 12 }}><span style={{ color: "#94a3b8" }}>{p.icon}</span> {p.txt}</div>
                        ))}
                      </td>
                      <td style={{ ...tdStyle, maxWidth: 320 }}>{row.description || "–"}</td>
                      <td style={{ ...tdStyle, textAlign: "right", whiteSpace: "nowrap" }}>
                        <button onClick={() => setExpanded(prev => { const n = new Set(prev); n.has(row.id) ? n.delete(row.id) : n.add(row.id); return n; })}
                          style={{ background: "white", color: "#0369a1", border: "1px solid #bae6fd", borderRadius: 6, padding: "3px 9px", cursor: "pointer", fontSize: 11, fontWeight: "bold" }}>
                          {isOpen ? "▴ Nascondi" : "▾ Dettagli"}
                        </button>
                      </td>
                    </tr>
                    {isOpen && (
                      <tr>
                        <td colSpan={7} style={{ background: "#f8fafc", padding: "12px 16px" }}>
                          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 12, fontSize: 12, fontFamily: "ui-monospace, Menlo, Consolas, monospace" }}>
                            {row.diff && <JsonBlock title="Diff" value={row.diff} />}
                            {row.before && <JsonBlock title="Before" value={row.before} />}
                            {row.after && <JsonBlock title="After" value={row.after} />}
                          </div>
                          <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 6 }}>
                            ID evento: {row.id}{row.entity_id ? ` · ID entità: ${row.entity_id}` : ""}
                          </div>
                        </td>
                      </tr>
                    )}
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* Pager */}
      <div style={{ display: "flex", gap: 10, alignItems: "center", justifyContent: "center", marginTop: 14 }}>
        <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={loading || page <= 1}
          style={{ background: "white", color: "#0369a1", border: "1px solid #bae6fd", borderRadius: 8, padding: "6px 14px", cursor: (loading || page <= 1) ? "not-allowed" : "pointer", fontSize: 13, fontWeight: "bold", opacity: page <= 1 ? 0.5 : 1 }}>
          ← Prec
        </button>
        <span style={{ color: "#64748b", fontSize: 13 }}>Pagina {page} / {totalPages}</span>
        <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={loading || page >= totalPages}
          style={{ background: "white", color: "#0369a1", border: "1px solid #bae6fd", borderRadius: 8, padding: "6px 14px", cursor: (loading || page >= totalPages) ? "not-allowed" : "pointer", fontSize: 13, fontWeight: "bold", opacity: page >= totalPages ? 0.5 : 1 }}>
          Succ →
        </button>
      </div>
    </div>
  );
}

// ---- Sotto-vista WhatsApp (wa_messages_log, cross-tenant) -----------------
// Etichette leggibili dei tipi di messaggio (vedi Edge Function invia-whatsapp).
const WA_TIPO_LABELS = {
  invito: "Invito",
  benvenuto: "Benvenuto",
  variazione_credito: "Variazione credito",
  recupero_password: "Recupero password",
};
// Colore del badge di stato dedotto dal valore (nessun enum fisso: gli stati
// Twilio possono cambiare). Successo → verde, errore → rosso, resto → grigio.
function waStatusStyle(status) {
  const s = (status || "").toLowerCase();
  if (/(deliver|read|sent|receiv)/.test(s)) return { background: "#d1fae5", color: "#047857" };
  if (/(fail|undeliver|error|reject)/.test(s)) return { background: "#fee2e2", color: "#b91c1c" };
  return { background: "#f1f5f9", color: "#64748b" };
}

function LogWhatsapp({ data }) {
  const stabById = useMemo(() => new Map((data.stabilimenti || []).map(s => [s.id, s])), [data.stabilimenti]);
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);
  const [err, setErr] = useState("");
  const [stabId, setStabId] = useState("");
  const [status, setStatus] = useState("");

  useEffect(() => {
    let cancelled = false;
    (async () => {
      setLoading(true); setErr("");
      const { data: d, error } = await sb
        .from("wa_messages_log").select("*")
        .order("created_at", { ascending: false }).limit(1000);
      if (cancelled) return;
      if (error) { setErr(error.message); setRows([]); }
      else setRows(d || []);
      setLoading(false);
    })();
    return () => { cancelled = true; };
  }, []);

  function stabLabel(id) {
    const s = stabById.get(id);
    return s ? (s.nome || "—") : (id ? id.slice(0, 8) : "—");
  }

  // Stati effettivamente presenti nei dati → opzioni del filtro (no enum hardcoded).
  const statusOptions = useMemo(() => {
    const set = new Set();
    rows.forEach(r => { if (r.status) set.add(r.status); });
    return Array.from(set).sort();
  }, [rows]);

  const filtered = useMemo(() => rows.filter(r =>
    (!stabId || r.stabilimento_id === stabId) &&
    (!status || r.status === status)
  ), [rows, stabId, status]);

  const selStyle = { ...inputStyle, width: "auto", minWidth: 130, padding: "7px 9px" };
  const filterLabel = { display: "block", fontSize: 11, fontWeight: "bold", color: "#64748b", textTransform: "uppercase", letterSpacing: 0.3, marginBottom: 3 };

  return (
    <div>
      {/* Filtri */}
      <div style={{ ...S.card, padding: 16, marginBottom: 14 }}>
        <div style={{ display: "flex", gap: 12, flexWrap: "wrap", alignItems: "flex-end" }}>
          <div>
            <label style={filterLabel}>Stabilimento</label>
            <select value={stabId} onChange={e => setStabId(e.target.value)} style={selStyle}>
              <option value="">Tutti</option>
              {(data.stabilimenti || []).slice().sort((a, b) => (a.nome || "").localeCompare(b.nome || "", "it")).map(s => (
                <option key={s.id} value={s.id}>{s.nome || s.id.slice(0, 8)}</option>
              ))}
            </select>
          </div>
          <div>
            <label style={filterLabel}>Stato</label>
            <select value={status} onChange={e => setStatus(e.target.value)} style={selStyle}>
              <option value="">Tutti</option>
              {statusOptions.map(st => <option key={st} value={st}>{st}</option>)}
            </select>
          </div>
        </div>
      </div>

      <div style={{ color: "#64748b", fontSize: 13, marginBottom: 12 }}>
        {loading ? "Caricamento…" : `${filtered.length} messaggi${rows.length >= 1000 ? " (ultimi 1000)" : ""}`}
      </div>

      {err && (
        <div style={{ ...S.card, borderColor: "#fecaca", padding: 12, marginBottom: 14, color: "#b91c1c", fontSize: 13 }}>⚠️ {err}</div>
      )}

      <div style={{ ...S.card, overflow: "hidden" }}>
        <div style={{ overflowX: "auto" }}>
          <table style={{ borderCollapse: "collapse", width: "100%", minWidth: 820, fontSize: 13 }}>
            <thead>
              <tr style={{ background: "#f0f9ff", color: "#0369a1", textAlign: "left" }}>
                <th style={thStyle}>Data</th>
                <th style={thStyle}>Stabilimento</th>
                <th style={thStyle}>Destinatario</th>
                <th style={thStyle}>Tipo</th>
                <th style={thStyle}>Stato</th>
                <th style={thStyle}>Errore</th>
              </tr>
            </thead>
            <tbody>
              {loading ? (
                <tr><td colSpan={6} style={{ padding: "30px 12px", textAlign: "center", color: "#94a3b8" }}>Caricamento…</td></tr>
              ) : filtered.length === 0 ? (
                <tr><td colSpan={6} style={{ padding: "30px 12px", textAlign: "center", color: "#94a3b8" }}>Nessun messaggio coi filtri selezionati</td></tr>
              ) : filtered.map(row => {
                const dt = new Date(row.created_at).toLocaleString("it-IT", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
                const badge = waStatusStyle(row.status);
                const errTxt = [row.error_code, row.error_message].filter(x => x !== null && x !== undefined && x !== "").join(" · ");
                return (
                  <tr key={row.id}>
                    <td style={{ ...tdStyle, whiteSpace: "nowrap", fontVariantNumeric: "tabular-nums", color: "#64748b", fontSize: 12 }}>{dt}</td>
                    <td style={tdStyle}><span style={{ fontWeight: 600, color: "#0369a1" }}>{stabLabel(row.stabilimento_id)}</span></td>
                    <td style={{ ...tdStyle, fontVariantNumeric: "tabular-nums" }}>{row.to_number || "–"}</td>
                    <td style={tdStyle}>{WA_TIPO_LABELS[row.tipo] || row.tipo || "–"}</td>
                    <td style={tdStyle}>
                      <span style={{ ...badge, fontSize: 11, fontWeight: "bold", padding: "2px 8px", borderRadius: 10 }}>{row.status || "–"}</span>
                    </td>
                    <td style={{ ...tdStyle, maxWidth: 280, color: errTxt ? "#b91c1c" : "#cbd5e1" }}>{errTxt || "–"}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function JsonBlock({ title, value }) {
  return (
    <div>
      <strong>{title}</strong>
      <pre style={{ margin: "4px 0 0", whiteSpace: "pre-wrap", wordBreak: "break-word", maxHeight: 240, overflow: "auto", background: "white", padding: 8, borderRadius: 4, border: "1px solid #e0f2fe" }}>
        {JSON.stringify(value, null, 2)}
      </pre>
    </div>
  );
}

window.__mountAdmin = function() {
  ReactDOM.createRoot(document.getElementById("root")).render(<AdminDashboard />);
};
</script>
</body>
</html>
